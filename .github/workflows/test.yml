name: Agent KB docs

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'sysadmin-analytics-agent-kb/ci-reports/**'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Agent KB CI and write report
        id: agent_kb_ci
        continue-on-error: true
        run: python sysadmin-analytics-agent-kb/tools/run_agent_kb_ci.py
        env:
          QUARTZ_REPO_URL: https://github.com/jackyzha0/quartz.git
          QUARTZ_BRANCH: v4

      - name: Commit CI report
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sysadmin-analytics-agent-kb/ci-reports/latest.md
          if git diff --cached --quiet; then
            echo "No CI report changes to commit"
          else
            git commit -m "Update Agent KB CI report [skip ci]"
            git push
          fi

      - uses: JamesIves/github-pages-deploy-action@v4
        if: steps.agent_kb_ci.outcome == 'success' && github.ref == 'refs/heads/main'
        with:
          branch: gh-pages
          folder: sysadmin-analytics-agent-kb/public

      - name: Fail workflow if Agent KB CI failed
        if: steps.agent_kb_ci.outcome != 'success'
        run: exit 1
