name: Agent KB docs
on: push
permissions:
  contents: write
jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - run: python sysadmin-analytics-agent-kb/tools/validate_docs.py && python sysadmin-analytics-agent-kb/tools/validate_wiki_links.py
      - run: python sysadmin-analytics-agent-kb/tools/build_link_graph.py
      - run: python sysadmin-analytics-agent-kb/tools/build_site.py
      - run: npx --yes markdownlint-cli2@0.18.1 'sysadmin-analytics-agent-kb/**/*.md'
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: sysadmin-analytics-agent-kb/public
