name: Agent KB docs
on: push
jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - run: python sysadmin-analytics-agent-kb/tools/validate_docs.py && python sysadmin-analytics-agent-kb/tools/validate_wiki_links.py
      - run: python sysadmin-analytics-agent-kb/tools/build_link_graph.py
      - run: npx --yes markdownlint-cli2@0.18.1 'sysadmin-analytics-agent-kb/**/*.md'
