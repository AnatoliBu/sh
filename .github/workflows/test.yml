name: Agent KB docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: python sysadmin-analytics-agent-kb/tools/validate_docs.py && python sysadmin-analytics-agent-kb/tools/validate_wiki_links.py
      - run: python sysadmin-analytics-agent-kb/tools/build_link_graph.py
      - run: bash sysadmin-analytics-agent-kb/tools/build_quartz_site.sh
        env:
          QUARTZ_REPO_TOKEN: ${{ secrets.QUARTZ_REPO_TOKEN }}
      - run: npx --yes markdownlint-cli2@0.18.1 'sysadmin-analytics-agent-kb/**/*.md'
      - uses: JamesIves/github-pages-deploy-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          branch: gh-pages
          folder: sysadmin-analytics-agent-kb/public
