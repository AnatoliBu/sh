name: Agent KB docs
on: push
jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Validate reference links
        run: python sysadmin-analytics-agent-kb/tools/validate_docs.py
      - name: Markdown lint
        run: npx --yes markdownlint-cli2@0.18.1 'sysadmin-analytics-agent-kb/**/*.md'
