version: 1
last_reviewed: 2026-06-07
purpose: >-
  Catalog of authoritative references for sysadmin and infrastructure skills.
  This file is machine-readable enough for agents and simple scripts.

tiers:
  tier_0:
    description: Standards and upstream manuals. Prefer for semantics and protocol behavior.
    sources:
      - name: RFC Editor
        url: https://www.rfc-editor.org/
        areas: [internet-standards, protocols]
      - name: IETF Datatracker
        url: https://datatracker.ietf.org/
        areas: [drafts, working-groups, protocol-status]
      - name: Linux Kernel Documentation
        url: https://docs.kernel.org/
        areas: [linux-kernel, networking, cgroups, filesystems]
      - name: Linux man-pages project
        url: https://man7.org/linux/man-pages/
        areas: [syscalls, libc, procfs, capabilities, commands]
      - name: systemd documentation
        url: https://systemd.io/
        areas: [systemd, journald, networkd, resolved]
      - name: OpenSSH manuals
        url: https://www.openssh.com/manual.html
        areas: [ssh, sshd, ssh-config, sshd-config]

  tier_1:
    description: Official project and vendor documentation. Prefer for supported operations.
    sources:
      - name: Debian Administrator's Handbook
        url: https://www.debian.org/doc/manuals/debian-handbook/
        areas: [debian, packages, services, network]
      - name: Ubuntu Server documentation
        url: https://ubuntu.com/server/docs/
        areas: [ubuntu-server, packages, operations]
      - name: Red Hat Enterprise Linux documentation
        url: https://docs.redhat.com/en/documentation/red_hat_enterprise_linux/
        areas: [rhel, selinux, networking, security]
      - name: NGINX documentation
        url: https://nginx.org/en/docs/
        areas: [nginx, reverse-proxy, tls]
      - name: PostgreSQL documentation
        url: https://www.postgresql.org/docs/current/
        areas: [postgresql, backups, replication, configuration]
      - name: Kubernetes documentation
        url: https://kubernetes.io/docs/
        areas: [kubernetes, workloads, networking, operations]
      - name: Docker documentation
        url: https://docs.docker.com/
        areas: [docker, compose, containers, storage, networking]
      - name: Prometheus documentation
        url: https://prometheus.io/docs/
        areas: [metrics, prometheus, alerting]
      - name: Grafana documentation
        url: https://grafana.com/docs/
        areas: [grafana, dashboards, alerting]

  tier_2:
    description: Secondary references. Use for examples and cross-checks, not final authority.
    sources:
      - name: ArchWiki
        url: https://wiki.archlinux.org/
        areas: [linux-practice, examples]
      - name: DigitalOcean Community Tutorials
        url: https://www.digitalocean.com/community/tutorials
        areas: [tutorials, examples]
      - name: CIS Benchmarks
        url: https://www.cisecurity.org/cis-benchmarks
        areas: [hardening, baselines]
      - name: NVD
        url: https://nvd.nist.gov/
        areas: [cve, vulnerability-metadata]
